<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Server Key</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  overflow-x:hidden;
  position:relative;
  min-height:100vh;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('https://sf-static.upanhlaylink.com/img/image_202604292be7d99f6d81d241b901050384d59134.jpg') no-repeat center center;
  background-size:cover;
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(4px);
  z-index:-1;
}

.box{

  width:90%;
  max-width:420px;

  margin:60px auto;

  background:rgba(18,0,34,0.75);

  backdrop-filter:blur(12px);

  border-radius:22px;

  padding:25px;

  box-sizing:border-box;

  border:1px solid rgba(255,255,255,0.1);

  box-shadow:
  0 0 25px #ff00cc55,
  0 0 50px #8a2be233;

}

h2{

  text-align:center;

  margin-bottom:20px;

  font-size:26px;

  background:linear-gradient(
  90deg,
  #ff00cc,
  #00ccff
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

}

input{

  width:100%;

  height:52px;

  padding:0 15px;

  margin-top:12px;

  border:none;

  outline:none;

  border-radius:14px;

  box-sizing:border-box;

  font-size:15px;

  color:white;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(10px);

}

input::placeholder{
  color:rgba(255,255,255,0.55);
}

button{

  width:100%;

  height:52px;

  margin-top:12px;

  border:none;

  border-radius:14px;

  cursor:pointer;

  font-size:15px;

  font-weight:bold;

  color:white;

  transition:0.25s;

  background:linear-gradient(
  90deg,
  #ff00cc,
  #8a2be2
  );

}

button:hover{

  transform:translateY(-2px);

  box-shadow:
  0 0 15px #ff00cc88,
  0 0 25px #8a2be255;

}

button:active{
  transform:scale(0.97);
}

#result{

  margin-top:20px;

  text-align:center;

  padding:15px;

  border-radius:15px;

  background:rgba(255,255,255,0.05);

  backdrop-filter:blur(8px);

  word-break:break-word;

  line-height:1.8;

}

.key-text{

  color:#00ffcc;

  font-size:22px;

  font-weight:bold;

}

.info{

  color:#cccccc;

  font-size:14px;

}

.copy-btn{

  margin-top:12px;

  background:linear-gradient(
  90deg,
  #00ccff,
  #0099ff
  );

}

.top-title{

  position:fixed;

  top:15px;

  right:15px;

  z-index:999;

  padding:10px 15px;

  border-radius:12px;

  background:rgba(0,0,0,0.45);

  backdrop-filter:blur(6px);

  color:#00ffcc;

  font-weight:bold;

  box-shadow:0 0 12px #00ffcc55;

}

@media(max-width:768px){

  .box{
    margin-top:40px;
    padding:20px;
  }

  h2{
    font-size:22px;
  }

}
.login-page{

  position:fixed;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;

  background:rgba(0,0,0,0.85);

  z-index:9999;

}

.login-box{

  width:90%;
  max-width:350px;

  padding:25px;

  border-radius:20px;

  background:rgba(18,0,34,0.85);

  backdrop-filter:blur(12px);

  box-shadow:
  0 0 25px #ff00cc55,
  0 0 50px #8a2be233;

}

.login-box h2{

  text-align:center;
  margin-bottom:20px;

}

.hidden{
  display:none;
}

</style>
</head>

<body>
  <!-- LOGIN ADMIN -->
<div id="loginPage" class="login-page">

<div class="login-box">

    <h2>🔐 ADMIN LOGIN</h2>

    <input
      type="text"
      id="username"
      placeholder="Tài khoản">

    <input
      type="password"
      id="password"
      placeholder="Mật khẩu">

    <button onclick="adminLogin()">
      ĐĂNG NHẬP
    </button>

  </div>

</div>

<div class="top-title">
  API KEY HUY MINH
</div>

<div class="box">

<h2>🔑 SERVER KEY</h2>

<input
type="text"
id="keyInput"
placeholder="Nhập key">

<input
type="number"
id="daysInput"
placeholder="Số ngày sử dụng">

<input
type="number"
id="deviceInput"
placeholder="Số thiết bị">

<button onclick="checkKey()">
✅ Kiểm Tra Key
</button>

<button onclick="createKey()">
🔑 Tạo Key
</button>

<button
class="copy-btn"
onclick="copyKey()">

📋 Sao Chép Key

</button>

<div id="result"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyCG0gzMq1UDYH-_iCjexsJuy1OY9qQLD1E",

authDomain: "serverkey-e7cc6.firebaseapp.com",

databaseURL: "https://serverkey-e7cc6-default-rtdb.firebaseio.com",

projectId: "serverkey-e7cc6",

storageBucket: "serverkey-e7cc6.firebasestorage.app",

messagingSenderId: "744043128336",

appId: "1:744043128336:web:2ec4b145220d3c7bbacc95"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);


// ================= LOGIN ADMIN =================

const ADMIN_USERS = [
  atob("dGFuaA=="),    
  atob("aHV5bWluaA==")  
];

const ADMIN_PASSWORDS = [
  atob("dGFuaDIwMDk="),     
  atob("aHV5bWluaGlvcw==")  

];

// Nếu đã login rồi → ẩn login page
if(localStorage.getItem("ADMIN_LOGIN") === "true"){
  document.getElementById("loginPage").classList.add("hidden");
}

window.adminLogin = function(){

  const user =
  document.getElementById("username").value;

  const pass =
  document.getElementById("password").value;

  if(
    ADMIN_USERS.includes(user) &&
    ADMIN_PASSWORDS.includes(pass)
  ){

    localStorage.setItem(
      "ADMIN_LOGIN",
      "true"
    );

    document
    .getElementById("loginPage")
    .classList.add("hidden");

    alert("✅ Đăng nhập thành công");

  }else{

    alert("❌ Sai tài khoản hoặc mật khẩu");

  }

}


// ================= TẠO KEY =================

window.createKey = async function(){

const days =
parseInt(document.getElementById("daysInput").value);

const maxDevices =
parseInt(document.getElementById("deviceInput").value);

if(!days || !maxDevices){

alert("Vui lòng nhập đầy đủ");

return;

}

if(maxDevices < 1){

alert("Số thiết bị phải lớn hơn 0");

return;

}

const chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

let key = "APP-";

for(let i=0;i<4;i++){

key += chars[
Math.floor(Math.random()*chars.length)
];

}

key += "-";

for(let i=0;i<4;i++){

key += chars[
Math.floor(Math.random()*chars.length)
];

}

const created =
Date.now();

const expire =
created + (
days * 24 * 60 * 60 * 1000
);

await set(ref(db,"keys/"+key),{

active:true,

created:created,

expire:expire,

days:days,

maxDevices:maxDevices,

devices:{}

});

document.getElementById("result").innerHTML = `

<div class="key-text">

${key}

</div>

<div class="info">

📅 ${days} ngày<br>
📱 ${maxDevices} thiết bị<br><br>

⏰ ${new Date(expire).toLocaleString()}

</div>

`;

}


// ================= CHECK KEY =================

window.checkKey = async function(){

const key =
document.getElementById("keyInput").value;

if(!key){

alert("Nhập key");

return;

}

const snapshot =
await get(ref(db,"keys/"+key));

if(!snapshot.exists()){

document.getElementById("result").innerHTML = `

<div style="color:#ff4d6d">

❌ Key không tồn tại

</div>

`;

return;

}

const data = snapshot.val();

if(data.active === false){

document.getElementById("result").innerHTML = `

<div style="color:#ff4d6d">

🚫 Key đã bị khóa

</div>

`;

return;

}

if(Date.now() > data.expire){

document.getElementById("result").innerHTML = `

<div style="color:#ff4d6d">

⏰ Key đã hết hạn

</div>

`;

return;

}

document.getElementById("result").innerHTML = `

<div class="key-text">

✅ KEY HỢP LỆ

</div>

<div class="info">

📅 ${data.days} ngày<br>
📱 ${data.maxDevices} thiết bị<br><br>

⏰ ${new Date(data.expire).toLocaleString()}

</div>

`;

}


// ================= COPY KEY =================

window.copyKey = function(){

const text =
document.getElementById("result").innerText;

if(!text){

alert("Chưa có key");

return;

}

navigator.clipboard.writeText(text)
.then(()=>{

alert("✅ Đã sao chép");

});

}

export {};

</script>

</body>
</html>
